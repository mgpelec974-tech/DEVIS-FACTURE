<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MGP ELEC - Gestion</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin: 10px; background:#f5f5f5; }
.card { background:white; padding:15px; border-radius:10px; margin:10px 0; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
input, select { padding:10px; margin:5px 0; width:100%; }
button { padding:12px; margin:5px 0; width:100%; border:none; border-radius:8px; background:#d62828; color:white; font-weight:bold; }
h1 { text-align:center; color:#d62828; }
.logo { text-align:center; }
.logo img { height:80px; }
</style>
</head>

<body>

<div class="logo">
<img src="logo-png.png">
</div>

<h1>MGP ELEC ⚡</h1>

<div class="card">

<h3>Client</h3>
<input type="text" id="client" placeholder="Nom client">
<button onclick="saveClient()">➕ Ajouter client</button>
<select id="clientList" onchange="selectClient()"></select>

<h3>Prestations</h3>
<div id="lignes"></div>
<button onclick="addLigne()">➕ Ajouter ligne</button>

<label>TVA (%)</label>
<input type="number" id="tva" value="8.5">

<button onclick="saveDevis()">💾 Enregistrer devis</button>
<button onclick="toFacture()">🧾 Générer facture</button>
<button onclick="pdf()">📄 PDF client</button>

</div>

<div class="card">
<h3>Historique</h3>
<div id="historique"></div>
</div>

<script>

// ================= CLIENTS =================
let clients = JSON.parse(localStorage.getItem("clients")) || [];

function saveClient(){
    let nom = document.getElementById("client").value;
    if(!nom) return alert("Nom vide");
    clients.push(nom);
    localStorage.setItem("clients", JSON.stringify(clients));
    afficherClients();
}

function afficherClients(){
    let select = document.getElementById("clientList");
    select.innerHTML = "";
    clients.forEach(c=>{
        select.innerHTML += `<option>${c}</option>`;
    });
}

function selectClient(){
    document.getElementById("client").value = document.getElementById("clientList").value;
}

// ================= LIGNES =================
function addLigne(){
    let div = document.createElement("div");
    div.innerHTML = `
    <input placeholder="Désignation">
    <input type="number" placeholder="Prix €">
    `;
    document.getElementById("lignes").appendChild(div);
}

addLigne();

// ================= CALCUL =================
function totalHT(){
    let lignes = document.querySelectorAll("#lignes div");
    let total = 0;

    lignes.forEach(l=>{
        let prix = l.children[1].value;
        total += parseFloat(prix || 0);
    });

    return total;
}

// ================= NUMERO =================
function numero(type, list){
    return type + "-" + String(list.length+1).padStart(3,"0");
}

// ================= GOOGLE SHEET =================
function sendToSheet(type, numero, client, montant){

fetch("https://script.google.com/macros/s/AKfycbxTjNb-hGf0kc5XaLTQWslhc6tRuwPwpmz7IcJzWfqxr4CWkEfX7tr4UKVW-xP3CL5W/exec", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        type: type,
        numero: numero,
        client: client,
        montant: montant
    })
})
.then(() => console.log("✅ Envoyé à Google Sheet"))
.catch(err => console.error("❌ Erreur :", err));

}

// ================= DEVIS =================
let devis = JSON.parse(localStorage.getItem("devis")) || [];

function saveDevis(){

    let client = document.getElementById("client").value;
    let ht = totalHT();
    let tva = parseFloat(document.getElementById("tva").value);

    let montantTVA = ht * (tva/100);
    let ttc = ht + montantTVA;

    let d = {
        num: numero("DEV", devis),
        client,
        ht,
        tva,
        ttc
    };

    devis.push(d);
    localStorage.setItem("devis", JSON.stringify(devis));

    sendToSheet("DEVIS", d.num, d.client, d.ttc);

    afficher();
}

// ================= FACTURE =================
let factures = JSON.parse(localStorage.getItem("factures")) || [];

function toFacture(){

    let client = document.getElementById("client").value;
    let ht = totalHT();
    let tva = parseFloat(document.getElementById("tva").value);

    let montantTVA = ht * (tva/100);
    let ttc = ht + montantTVA;

    let f = {
        num: numero("FAC", factures),
        client,
        ht,
        tva,
        ttc
    };

    factures.push(f);
    localStorage.setItem("factures", JSON.stringify(factures));

    sendToSheet("FACTURE", f.num, f.client, f.ttc);

    afficher();
}

// ================= PDF =================
async function pdf(){

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let client = document.getElementById("client").value;
    let lignes = document.querySelectorAll("#lignes div");

    let y = 20;
    let total = 0;

    doc.setFontSize(18);
    doc.text("MGP ELEC", 10, 10);

    doc.setFontSize(12);
    doc.text("Client : " + client, 10, y);
    y += 10;

    lignes.forEach(l=>{
        let nom = l.children[0].value;
        let prix = parseFloat(l.children[1].value || 0);

        doc.text(nom + " - " + prix + "€", 10, y);
        y += 10;
        total += prix;
    });

    let tva = parseFloat(document.getElementById("tva").value);
    let montantTVA = total * (tva/100);
    let ttc = total + montantTVA;

    y += 10;
    doc.text("HT : " + total + " €", 10, y);
    y += 10;
    doc.text("TVA : " + montantTVA + " €", 10, y);
    y += 10;
    doc.text("TTC : " + ttc + " €", 10, y);

    doc.save("MGP_ELEC.pdf");
}

// ================= AFFICHAGE =================
function afficher(){

    let div = document.getElementById("historique");
    div.innerHTML = "";

    devis.forEach(d=>{
        div.innerHTML += `📄 ${d.num} - ${d.client} - ${d.ttc}€<br>`;
    });

    factures.forEach(f=>{
        div.innerHTML += `🧾 ${f.num} - ${f.client} - ${f.ttc}€<br>`;
    });
}

afficher();
afficherClients();

</script>

</body>
</html>
