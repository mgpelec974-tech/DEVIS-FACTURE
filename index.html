<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MGP ELEC - PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin: 10px; background:#f5f5f5; }
.card { background:white; padding:15px; border-radius:10px; margin:10px 0; }
input, select { padding:10px; margin:5px 0; width:100%; }
button { padding:12px; margin:5px 0; width:100%; background:#d62828; color:white; border:none; border-radius:8px; }
.logo { text-align:center; }
.logo img { height:80px; }
</style>
</head>

<body>

<div class="logo">
<img src="logo-png.png">
</div>

<h1 style="text-align:center;">MGP ELEC ⚡</h1>

<div class="card">

<h3>Client</h3>
<input id="client" placeholder="Nom client">
<button onclick="saveClient()">➕ Ajouter client</button>
<select id="clientList" onchange="selectClient()"></select>

<h3>Prestations</h3>
<div id="lignes"></div>
<button onclick="addLigne()">➕ Ajouter ligne</button>

<label>TVA (%)</label>
<input id="tva" value="8.5">

<button onclick="saveDevis()">💾 Devis</button>
<button onclick="toFacture()">🧾 Facture</button>
<button onclick="pdf()">📄 PDF PRO</button>

</div>

<div class="card">
<h3>Historique</h3>
<div id="historique"></div>
</div>

<script>

// CLIENTS
let clients = JSON.parse(localStorage.getItem("clients")) || [];

function saveClient(){
let nom = client.value;
if(!nom) return;
clients.push(nom);
localStorage.setItem("clients", JSON.stringify(clients));
afficherClients();
}

function afficherClients(){
clientList.innerHTML="";
clients.forEach(c=>{
clientList.innerHTML+=`<option>${c}</option>`;
});
}

function selectClient(){
client.value = clientList.value;
}

// LIGNES
function addLigne(){
let div = document.createElement("div");
div.innerHTML = `
<input placeholder="Désignation">
<input type="number" placeholder="Prix €">
`;
lignes.appendChild(div);
}

addLigne();

// CALCUL
function totalHT(){
let total=0;
document.querySelectorAll("#lignes div").forEach(l=>{
total+=parseFloat(l.children[1].value||0);
});
return total;
}

// NUMERO
function numero(type,list){
return type+"-"+String(list.length+1).padStart(3,"0");
}

// GOOGLE SHEET
function sendToSheet(type, numero, client, montant){

fetch("https://script.google.com/macros/s/AKfycbxTjNb-hGf0kc5XaLTQWslhc6tRuwPwpmz7IcJzWfqxr4CWkEfX7tr4UKVW-xP3CL5W/exec",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({type,numero,client,montant})
});

}

// DEVIS
let devis = JSON.parse(localStorage.getItem("devis")) || [];

function saveDevis(){
let ht = totalHT();
let tva = 8.5;
let remise = ht*0.30;
let totalHTremise = ht-remise;
let ttc = totalHTremise*(1+tva/100);

let d={
num:numero("DEV",devis),
client:client.value,
ttc
};

devis.push(d);
localStorage.setItem("devis",JSON.stringify(devis));

sendToSheet("DEVIS", d.num, d.client, d.ttc);

afficher();
}

// FACTURE
let factures = JSON.parse(localStorage.getItem("factures")) || [];

function toFacture(){
let ht = totalHT();
let tva = 8.5;
let remise = ht*0.30;
let totalHTremise = ht-remise;
let ttc = totalHTremise*(1+tva/100);

let f={
num:numero("FAC",factures),
client:client.value,
ttc
};

factures.push(f);
localStorage.setItem("factures",JSON.stringify(factures));

sendToSheet("FACTURE", f.num, f.client, f.ttc);

afficher();
}

// PDF PRO
async function pdf(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let total=0;
let y=20;

// LOGO
let img=new Image();
img.src="logo-png.png";

img.onload=function(){

doc.addImage(img,"PNG",10,5,50,20);

doc.text("DEVIS",150,15);

doc.setFontSize(10);
doc.text("MGP ELEC",10,30);
doc.text("97440 Saint-André",10,35);
doc.text("SIREN 929986180",10,40);

doc.text("Client : "+client.value,10,50);

y=65;

// TABLE
doc.text("Désignation",10,y);
doc.text("Prix",150,y);

y+=5;
doc.line(10,y,200,y);
y+=5;

document.querySelectorAll("#lignes div").forEach(l=>{
let nom=l.children[0].value;
let prix=parseFloat(l.children[1].value||0);

doc.text(nom,10,y);
doc.text(prix+" €",150,y);

y+=8;
total+=prix;
});

// CALCULS
let remise=total*0.30;
let ht=total-remise;
let tva=ht*0.085;
let ttc=ht+tva;

y+=10;

doc.text("Sous-total HT : "+total.toFixed(2),130,y);
y+=8;
doc.text("Remise 30% : -"+remise.toFixed(2),130,y);
y+=8;
doc.text("Total HT : "+ht.toFixed(2),130,y);
y+=8;
doc.text("TVA : "+tva.toFixed(2),130,y);
y+=8;
doc.text("TOTAL TTC : "+ttc.toFixed(2),130,y);

y+=20;

doc.text("Bon pour accord",10,y);

doc.save("Devis_MGP_ELEC.pdf");

}

}

// AFFICHAGE
function afficher(){
historique.innerHTML="";
devis.forEach(d=>{
historique.innerHTML+=`📄 ${d.num} - ${d.client} - ${d.ttc}€<br>`;
});
factures.forEach(f=>{
historique.innerHTML+=`🧾 ${f.num} - ${f.client} - ${f.ttc}€<br>`;
});
}

afficher();
afficherClients();

</script>

</body>
</html>
