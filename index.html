<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MGP ELEC - ENTREPRISE</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:10px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
input, select { width:100%; padding:10px; margin:5px 0; }
button { width:100%; padding:12px; margin:5px 0; background:#d62828; color:white; border:none; border-radius:8px; }
canvas { border:1px solid #000; width:100%; }
</style>
</head>

<body>

<h2>MGP ELEC ⚡</h2>

<div class="card">

<input id="client" placeholder="Client">

<div id="lignes"></div>
<button onclick="addLigne()">Ajouter ligne</button>

<input id="remise" value="30">
<input id="tva" value="8.5">

<select id="modePaiement">
<option value="acompte">Acompte 40%</option>
<option value="3fois">3 paiements</option>
</select>

<button onclick="saveFacture()">Créer facture</button>
<button onclick="pdf()">PDF</button>

</div>

<div class="card">
<h3>Suivi paiement</h3>
<div id="suivi"></div>
</div>

<div class="card">
<h3>Chiffre d'affaires</h3>
<div id="ca"></div>
</div>

<script>

// LIGNES
function addLigne(){
let div=document.createElement("div");
div.innerHTML=`
<input placeholder="Désignation">
<input type="number" value="1">
<input type="number" value="0">
`;
lignes.appendChild(div);
}
addLigne();

// CALCUL
function calcul(){
let total=0;
document.querySelectorAll("#lignes div").forEach(l=>{
let q=l.children[1].value;
let p=l.children[2].value;
total+=q*p;
});
let remiseVal=total*(remise.value/100);
let ht=total-remiseVal;
let tvaVal=ht*(tva.value/100);
let ttc=ht+tvaVal;
return {total,remiseVal,ht,tvaVal,ttc};
}

// NUMERO
function numero(){
return "FAC-"+Date.now();
}

// FACTURES
let factures=JSON.parse(localStorage.getItem("factures"))||[];

function saveFacture(){

let c=calcul();

let f={
num:numero(),
client:client.value,
ttc:c.ttc,
paye:false
};

factures.push(f);
localStorage.setItem("factures",JSON.stringify(factures));

afficher();
}

// SUIVI PAIEMENT
function togglePaiement(i){
factures[i].paye=!factures[i].paye;
localStorage.setItem("factures",JSON.stringify(factures));
afficher();
}

// AFFICHAGE
function afficher(){

// suivi
suivi.innerHTML="";
let totalCA=0;

factures.forEach((f,i)=>{
suivi.innerHTML+=`
${f.num} - ${f.client} - ${f.ttc.toFixed(2)} €
<button onclick="togglePaiement(${i})">
${f.paye?"✅ Payé":"❌ Non payé"}
</button><br>`;
if(f.paye) totalCA+=f.ttc;
});

// CA
ca.innerHTML="Chiffre d'affaires encaissé : "+totalCA.toFixed(2)+" €";

}

afficher();

// PDF
function pdf(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

let c=calcul();

doc.text("FACTURE",150,10);
doc.text("MGP ELEC",10,10);
doc.text("SIREN 929986180",10,15);
doc.text("Client : "+client.value,10,25);
doc.text("Date : "+new Date().toLocaleDateString(),150,20);

let y=40;

document.querySelectorAll("#lignes div").forEach(l=>{
let nom=l.children[0].value;
let q=l.children[1].value;
let p=l.children[2].value;
doc.text(nom+" x"+q+" = "+(q*p)+" €",10,y);
y+=8;
});

y+=10;

doc.text("HT : "+c.ht.toFixed(2),130,y);
y+=8;
doc.text("TVA : "+c.tvaVal.toFixed(2),130,y);
y+=8;
doc.text("TTC : "+c.ttc.toFixed(2),130,y);

y+=10;
doc.text("IBAN : FR76 4061 8803 3500 0407 1416 017",10,y);

doc.save("facture.pdf");

}

</script>

</body>
</html>
