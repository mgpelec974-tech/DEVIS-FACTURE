<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MGP ELEC - PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin: 10px; background:#f5f5f5; }
.card { background:white; padding:15px; border-radius:10px; margin:10px 0; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
input { padding:10px; margin:5px 0; width:100%; }
button { padding:10px; margin:5px 0; width:100%; border:none; border-radius:8px; background:#007bff; color:white; }
h1 { text-align:center; }
</style>
</head>

<body>

<h1>MGP ELEC ⚡</h1>

<div class="card">
<input type="text" id="client" placeholder="Nom client">

<h3>Prestations</h3>
<div id="lignes"></div>

<button onclick="addLigne()">➕ Ajouter ligne</button>

<label>TVA (%)</label>
<input type="number" id="tva" value="8.5">

<button onclick="saveDevis()">💾 Enregistrer devis</button>
<button onclick="toFacture()">🧾 Générer facture</button>
<button onclick="pdf()">📄 PDF client</button>
</div>

<div class="card">
<h3>Historique</h3>
<div id="historique"></div>
</div>

<script>

let devis = JSON.parse(localStorage.getItem("devis")) || [];
let factures = JSON.parse(localStorage.getItem("factures")) || [];

function addLigne(){
    let div = document.createElement("div");
    div.innerHTML = `
    <input placeholder="Désignation">
    <input type="number" placeholder="Prix €">
    `;
    document.getElementById("lignes").appendChild(div);
}

addLigne();

function total(){
    let lignes = document.querySelectorAll("#lignes div");
    let total = 0;

    lignes.forEach(l=>{
        let prix = l.children[1].value;
        total += parseFloat(prix || 0);
    });

    return total;
}

function numero(type, list){
    return type + "-" + String(list.length+1).padStart(3,"0");
}

function saveDevis(){
    let d = {
        num: numero("DEV", devis),
        client: document.getElementById("client").value,
        total: total()
    };

    devis.push(d);
    localStorage.setItem("devis", JSON.stringify(devis));
    afficher();
}

function toFacture(){
    let f = {
        num: numero("FAC", factures),
        client: document.getElementById("client").value,
        total: total()
    };

    factures.push(f);
    localStorage.setItem("factures", JSON.stringify(factures));
    afficher();
}

function afficher(){
    let div = document.getElementById("historique");
    div.innerHTML = "";

    devis.forEach(d=>{
        div.innerHTML += `📄 ${d.num} - ${d.client} - ${d.total}€<br>`;
    });

    factures.forEach(f=>{
        div.innerHTML += `🧾 ${f.num} - ${f.client} - ${f.total}€<br>`;
    });
}

async function pdf(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let client = document.getElementById("client").value;
    let lignes = document.querySelectorAll("#lignes div");

    let y = 20;

    doc.setFontSize(18);
    doc.text("MGP ELEC", 10, 10);

    doc.setFontSize(12);
    doc.text("Client : " + client, 10, y);

    y += 10;

    let total = 0;

    lignes.forEach(l=>{
        let nom = l.children[0].value;
        let prix = parseFloat(l.children[1].value || 0);

        doc.text(nom + " - " + prix + "€", 10, y);
        y += 10;
        total += prix;
    });

    y += 10;
    doc.text("TOTAL : " + total + " €", 10, y);

    doc.save("devis.pdf");
}

afficher();

</script>

</body>
</html>
