<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MGP ELEC - EXPERT</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:10px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
input, select { width:100%; padding:10px; margin:5px 0; }
button { width:100%; padding:12px; margin:5px 0; background:#d62828; color:white; border:none; border-radius:8px; }
.logo { text-align:center; }
.logo img { height:80px; }
canvas { border:1px solid #000; width:100%; }
</style>
</head>

<body>

<div class="logo">
<img src="logo-png.png">
</div>

<h2 style="text-align:center;">MGP ELEC ⚡</h2>

<div class="card">

<h3>Client</h3>
<input id="client" placeholder="Nom client">
<button onclick="saveClient()">➕ Ajouter client</button>
<select id="clientList" onchange="selectClient()"></select>

<h3>Prestations</h3>
<div id="lignes"></div>
<button onclick="addLigne()">➕ Ajouter ligne</button>

<label>Remise (%)</label>
<input id="remise" value="30">

<label>TVA (%)</label>
<input id="tva" value="8.5">

<h3>Signature client</h3>
<canvas id="signature" height="100"></canvas>
<button onclick="clearSign()">Effacer signature</button>

<button onclick="saveDevis()">💾 Devis</button>
<button onclick="toFacture()">🧾 Facture</button>
<button onclick="pdf()">📄 PDF EXPERT</button>

</div>

<div class="card">
<h3>Historique</h3>
<div id="historique"></div>
</div>

<script>

// ================= CLIENTS =================
// ================= CLIENTS =================
let clients = JSON.parse(localStorage.getItem("clients")) || [];

function saveClient(){
    let nom = document.getElementById("client").value;

    if(!nom){
        alert("Entre un nom client");
        return;
    }

    // éviter doublons
    if(!clients.includes(nom)){
        clients.push(nom);
        localStorage.setItem("clients", JSON.stringify(clients));
    }

    afficherClients();

    alert("✅ Client enregistré");
}

function afficherClients(){
    let select = document.getElementById("clientList");

    select.innerHTML = "<option value=''>-- Sélectionner un client --</option>";

    clients.forEach(c=>{
        let option = document.createElement("option");
        option.value = c;
        option.textContent = c;
        select.appendChild(option);
    });
}

function selectClient(){
    let selected = document.getElementById("clientList").value;

    if(selected){
        document.getElementById("client").value = selected;
    }
}

// 🔥 IMPORTANT : charger au démarrage
window.onload = function(){
    afficherClients();
}

// ================= LIGNES =================
function addLigne(){
let div=document.createElement("div");
div.innerHTML=`
<input placeholder="Désignation">
<input type="number" placeholder="Quantité">
<input type="number" placeholder="Prix unitaire €">
`;
document.getElementById("lignes").appendChild(div);
}
addLigne();

// ================= CALCUL =================
function calcul(){
let total=0;

document.querySelectorAll("#lignes div").forEach(l=>{
let qte=parseFloat(l.children[1].value||0);
let prix=parseFloat(l.children[2].value||0);
total+=qte*prix;
});

let remiseVal=total*(parseFloat(document.getElementById("remise").value)/100);
let ht=total-remiseVal;
let tvaVal=ht*(parseFloat(document.getElementById("tva").value)/100);
let ttc=ht+tvaVal;

return {total,remiseVal,ht,tvaVal,ttc};
}

// ================= NUMERO =================
function numero(type,list){
return type+"-"+String(list.length+1).padStart(4,"0");
}

// ================= GOOGLE SHEET =================
function sendToSheet(type, numero, client, montant){
fetch("https://script.google.com/macros/s/AKfycbxTjNb-hGf0kc5XaLTQWslhc6tRuwPwpmz7IcJzWfqxr4CWkEfX7tr4UKVW-xP3CL5W/exec",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({type,numero,client,montant})
}).catch(err=>console.log(err));
}

// ================= DEVIS =================
let devis=JSON.parse(localStorage.getItem("devis"))||[];

function saveDevis(){
let c=calcul();

let d={
num:numero("DEV",devis),
client:document.getElementById("client").value,
ttc:c.ttc
};

devis.push(d);
localStorage.setItem("devis",JSON.stringify(devis));

sendToSheet("DEVIS",d.num,d.client,d.ttc);

afficher();
}

// ================= FACTURE =================
let factures=JSON.parse(localStorage.getItem("factures"))||[];

function toFacture(){
let c=calcul();

let f={
num:numero("FAC",factures),
client:document.getElementById("client").value,
ttc:c.ttc
};

factures.push(f);
localStorage.setItem("factures",JSON.stringify(factures));

sendToSheet("FACTURE",f.num,f.client,f.ttc);

afficher();
}

// ================= SIGNATURE =================
let canvas=document.getElementById("signature");
let ctx=canvas.getContext("2d");
let draw=false;

canvas.addEventListener("mousedown",()=>draw=true);
canvas.addEventListener("mouseup",()=>draw=false);
canvas.addEventListener("mousemove",(e)=>{
if(!draw) return;
ctx.lineWidth=2;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
});

function clearSign(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ================= PDF (STABLE) =================
function pdf(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let client = document.getElementById("client").value;
let lignes = document.querySelectorAll("#lignes div");

let y = 20;
let total = 0;

// 🔥 ENTETE
doc.setFontSize(16);
doc.text("MGP ELEC", 10, 10);

doc.setFontSize(10);
doc.text("314 chemin jeanson", 10, 15);
doc.text("97440 Saint-André", 10, 20);
doc.text("SIREN : 929986180", 10, 25);

doc.text("Devis N° : " + Date.now(), 140, 10);
doc.text("Date : " + new Date().toLocaleDateString(), 140, 15);

doc.text("Client : " + client, 10, 35);

// 🔥 TABLEAU
y = 45;

doc.setFontSize(10);
doc.text("Désignation", 10, y);
doc.text("Qté", 100, y);
doc.text("PU €", 120, y);
doc.text("TVA", 145, y);
doc.text("Total €", 170, y);

y += 5;
doc.line(10, y, 200, y);
y += 5;

// 🔥 LIGNES
lignes.forEach(l => {

let nom = l.children[0].value || "";
let qte = parseFloat(l.children[1].value) || 0;
let prix = parseFloat(l.children[2].value) || 0;

let totalLigne = qte * prix;

doc.text(nom, 10, y);
doc.text(qte.toString(), 100, y);
doc.text(prix.toFixed(2), 120, y);
doc.text("8.5%", 145, y);
doc.text(totalLigne.toFixed(2), 170, y);

y += 8;
total += totalLigne;

});

// 🔥 CALCULS
let remise = total * 0.30;
let totalHT = total - remise;
let tva = totalHT * 0.085;
let ttc = totalHT + tva;

y += 10;

// 🔥 TOTAUX
doc.text("Sous-total HT : " + total.toFixed(2) + " €", 130, y);
y += 8;
doc.text("Remise HT (30%) : -" + remise.toFixed(2) + " €", 130, y);
y += 8;
doc.text("Total HT : " + totalHT.toFixed(2) + " €", 130, y);
y += 8;
doc.text("TVA 8.5% : " + tva.toFixed(2) + " €", 130, y);
y += 8;

doc.setFontSize(12);
doc.text("TOTAL TTC : " + ttc.toFixed(2) + " €", 130, y);

// 🔥 MENTIONS
y += 15;

doc.setFontSize(8);
doc.text("Pour être accepté, le devis doit être daté, signé et suivi de la mention 'Bon pour accord'.", 10, y);

y += 10;
doc.text("Banque: BoursoBank - BIC: BOUS FRPP XXX", 10, y);
y += 5;
doc.text("IBAN: FR76 4061 8803 3500 0407 1416 017", 10, y);

y += 10;
doc.text("MGP ELEC - SIREN 929986180 - RC PRO - ASSURANCE DECENNALE APRIL: W4183819", 10, y);

// 🔥 SIGNATURE
y += 20;
doc.text("Signature client :", 10, y);

let canvas = document.getElementById("signature");
let img = canvas.toDataURL("image/png");
doc.addImage(img, "PNG", 10, y + 5, 60, 20);

y += 30;
doc.text("Bon pour accord", 10, y);

// 🔥 EXPORT
doc.save("Devis_MGP_ELEC.pdf");

}

// ================= AFFICHAGE =================
function afficher(){
let div=document.getElementById("historique");
div.innerHTML="";

devis.forEach(d=>{
div.innerHTML+=`📄 ${d.num} - ${d.client} - ${d.ttc.toFixed(2)}€<br>`;
});

factures.forEach(f=>{
div.innerHTML+=`🧾 ${f.num} - ${f.client} - ${f.ttc.toFixed(2)}€<br>`;
});
}

afficher();
afficherClients();

</script>

</body>
</html>
